<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azzura | Payment Successful</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{
      extend:{
        colors:{
          "primary":"#003674","secondary":"#0051d5",
          "background":"#f9f9ff","surface":"#f9f9ff","on-surface":"#151c27","on-surface-variant":"#424751",
          "outline-variant":"#c2c6d3"
        },
        fontFamily:{
          "headline-lg":["Manrope"],"title-md":["Manrope"],"body-md":["Inter"]
        }
      }
    }
  }
</script>
<link rel="stylesheet" href="success.css"/>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden min-h-screen flex flex-col">

<!-- Confetti Canvas -->
<div id="confetti" class="confetti-wrap"></div>

<nav class="w-full bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-sm py-4 z-10 relative">
  <div class="flex justify-center items-center px-4">
    <a href="prototype.html" class="font-headline-lg text-[28px] font-semibold tracking-tighter text-primary">Azzura</a>
  </div>
</nav>

<main class="flex-grow flex items-center justify-center py-12 px-4 relative z-10">
  <div class="w-full">
    
    <div class="text-center mb-8">
      <div class="success-ring">
        <span class="material-symbols-outlined text-[48px] text-green-600 font-bold" style="font-variation-settings:'wght' 700">check</span>
      </div>
      <h1 class="font-headline-lg text-[32px] text-primary mb-2">Payment Successful!</h1>
      <p class="text-on-surface-variant max-w-sm mx-auto">Thank you for your order. We've sent a confirmation email to <span id="customer-email" class="font-semibold text-primary"></span>.</p>
    </div>

    <div class="order-card">
      <h2 class="font-title-md text-primary text-lg mb-6 flex items-center gap-2">
        <span class="material-symbols-outlined text-secondary">receipt_long</span> Order Details
      </h2>

      <div class="space-y-1 mb-8">
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-value status-badge paid"><span class="material-symbols-outlined text-sm">check_circle</span> Paid</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Order ID</span>
          <span class="detail-value highlight" id="order-id"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Payment ID</span>
          <span class="detail-value" id="payment-id"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Customer Name</span>
          <span class="detail-value" id="customer-name"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Date & Time</span>
          <span class="detail-value" id="order-date"></span>
        </div>
        <div class="detail-row mt-2 border-t-2 border-outline-variant/30 pt-4">
          <span class="detail-label text-base font-bold text-primary">Amount Paid</span>
          <span class="detail-value amount" id="amount-paid"></span>
        </div>
      </div>

      <div class="action-buttons flex flex-col sm:flex-row gap-4 pt-4 border-t border-outline-variant/20">
        <button onclick="window.print()" class="action-btn secondary flex-1">
          <span class="material-symbols-outlined">download</span> Download Invoice
        </button>
        <a href="productss.html" class="action-btn primary flex-1">
          <span class="material-symbols-outlined">storefront</span> Continue Shopping
        </a>
      </div>
    </div>

  </div>
</main>

<footer class="bg-white w-full py-6 border-t border-outline-variant/10 relative z-10 text-center text-sm text-on-surface-variant">
  © 2024 Azzura Healthcare. Nurturing Human Lives.
</footer>

<script src="success.js"></script>
</body>
</html>
