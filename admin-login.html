  <!-- Google Fonts: Inter + DM Serif Display -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primary:       #1A5FA8;
      --color-primary-dark:  #134a87;
      --color-primary-light: #E8F1FB;
      --color-dark:          #1A1A2E;
      --color-grey:          #6B7280;
      --color-gold:          #C9A84C;
      --color-border:        #D1E3F8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-primary-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: #ffffff;
      border: 1.5px solid var(--color-border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 12px 48px rgba(26, 95, 168, 0.10);
    }

    /* ── Card Header ──────────────────────────────────────── */
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-text {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--color-primary);
      letter-spacing: 0.06em;
      line-height: 1;
      display: block;
      margin-bottom: 6px;
    }

    .portal-badge {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--color-gold);
      margin-bottom: 20px;
    }

    .divider-line {
      width: 40px;
      height: 2px;
      background: var(--color-border);
      margin: 0 auto 20px;
      border-radius: 2px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--color-dark);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--color-grey);
      line-height: 1.5;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 6px;
    }

    /* Input wrapper: position:relative so toggle sits inside */
    .input-wrapper {
      position: relative;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      width: 100%;
      background: #fff;
      color: var(--color-dark);
      transition: border-color 0.18s ease;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: var(--color-primary);
      outline: none;
    }

    /* Extra right padding so text doesn't overlap the toggle icon */
    #password {
      padding-right: 44px;
    }

    /* ── Password Toggle Button ───────────────────────────── */
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-grey);
      user-select: none;
      outline: none;
    }

    .toggle-password:focus-visible {
      outline: 2px solid var(--color-primary);
      border-radius: 4px;
    }

    /* ── Sign In Button ───────────────────────────────────── */
    .btn-signin {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 24px;
      background-color: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: background-color 0.2s ease, opacity 0.2s ease;
      letter-spacing: 0.01em;
    }

    .btn-signin:hover:not(:disabled) {
      background-color: var(--color-primary-dark);
    }

    .btn-signin:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* ── Spinner Animation ────────────────────────────────── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
      font-style: normal;
      line-height: 1;
    }

    /* ── Error Message ────────────────────────────────────── */
    .error-message {
      display: none;
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c53030;
      margin-top: 14px;
      line-height: 1.5;
    }

    .error-message.show {
      display: block;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .card-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--color-grey);
      border-top: 1px solid var(--color-border);
      padding-top: 20px;
    }
  </style>
