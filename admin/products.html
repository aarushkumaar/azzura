<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products — Azzurra Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="admin-body">

<div class="admin-shell" id="adminLayout">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar__brand">
      <span class="admin-sidebar__logo">AZZURRA</span>
      <span class="admin-sidebar__tag">Pharmaconutrition</span>
    </div>

    <nav class="admin-nav">
      <a href="dashboard.html" class="admin-nav__link">
        <span class="admin-nav__icon">📊</span> Dashboard
      </a>
      <a href="products.html" class="admin-nav__link active">
        <span class="admin-nav__icon">📦</span> Products
      </a>
    </nav>

    <div class="admin-sidebar__footer">
      <div class="admin-user-info">
        <div class="admin-user-info__avatar" id="userAvatar">A</div>
        <div>
          <div class="admin-user-info__email" id="userEmail">—</div>
          <div class="admin-user-info__role">Admin</div>
        </div>
      </div>
      <button class="admin-logout-btn" id="signOutBtn" title="Sign Out">🚪</button>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="admin-main">

    <header class="admin-topbar">
      <div class="admin-topbar__title">Products</div>
      <button class="admin-add-btn admin-add-btn" id="addProductBtn"
        style="background:var(--color-primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;">
        ＋ Add Product
      </button>
    </header>

    <div class="admin-section">
      <div class="admin-section-toolbar">
        <div class="admin-search-wrap">
          <input type="text" id="searchInput" class="admin-search" placeholder="Search products…" />
        </div>
        <select id="filterSeries" class="admin-filter-select">
          <option value="">All Series</option>
          <option value="Essential">Essential</option>
          <option value="Vital">Vital</option>
          <option value="Max">Max</option>
          <option value="Provit">Provit</option>
          <option value="Lifeline">Lifeline</option>
          <option value="Oral">Oral</option>
        </select>
        <span id="productCount" style="font-size:13px;color:var(--color-grey);white-space:nowrap;"></span>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Thumb</th>
              <th>Name</th>
              <th>Series</th>
              <th>Price (₹)</th>
              <th>In Stock</th>
              <th>Featured</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="8" class="table-loading">Loading products…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ═══ PANEL OVERLAY ═══ -->
<div class="side-panel-overlay" id="panelOverlay"></div>

<!-- ═══ SLIDE-IN PANEL ═══ -->
<div class="side-panel" id="productPanel" role="dialog" aria-modal="true">
  <div class="side-panel__header">
    <span class="side-panel__title" id="panelTitle">Add New Product</span>
    <button class="side-panel__close" id="panelCloseBtn">&times;</button>
  </div>

  <div class="side-panel__body">
    <form id="productForm" novalidate>
      <input type="hidden" id="fieldId" />

      <div style="display:flex;flex-direction:column;gap:16px;">

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">
            Product Name <span style="color:#fc8181;">*</span>
          </label>
          <input type="text" id="fieldName" class="admin-search" placeholder="e.g. Azzurra Whey Protein" style="width:100%;box-sizing:border-box;" />
          <span style="font-size:12px;color:#fc8181;display:block;margin-top:4px;" id="errName"></span>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Series</label>
          <select id="fieldSeries" class="admin-filter-select" style="width:100%;box-sizing:border-box;">
            <option value="">— Select Series —</option>
            <option value="Essential">Essential</option>
            <option value="Vital">Vital</option>
            <option value="Max">Max</option>
            <option value="Provit">Provit</option>
            <option value="Lifeline">Lifeline</option>
            <option value="Oral">Oral</option>
          </select>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Flavour</label>
          <input type="text" id="fieldFlavour" class="admin-search" placeholder="e.g. Chocolate, Vanilla" style="width:100%;box-sizing:border-box;" />
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">
            Price (₹) <span style="color:#fc8181;">*</span>
          </label>
          <input type="number" id="fieldPrice" class="admin-search" placeholder="e.g. 1299" min="0" step="0.01" style="width:100%;box-sizing:border-box;" />
          <span style="font-size:12px;color:#fc8181;display:block;margin-top:4px;" id="errPrice"></span>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Net Weight</label>
          <input type="text" id="fieldWeight" class="admin-search" placeholder="e.g. 500g, 1kg" style="width:100%;box-sizing:border-box;" />
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Image Folder</label>
          <input type="text" id="fieldImageFolder" class="admin-search" placeholder="e.g. whey-protein-choc" style="width:100%;box-sizing:border-box;" />
          <span class="form-hint">Folder inside assets/products/ — loads IMAGES/1.jpg</span>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Tags</label>
          <input type="text" id="fieldTags" class="admin-search" placeholder="e.g. protein, recovery" style="width:100%;box-sizing:border-box;" />
        </div>

        <hr style="border:none;border-top:1.5px solid var(--color-border);margin:4px 0;" />

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Short Description</label>
          <textarea id="fieldShortDesc" class="admin-search" rows="3" placeholder="Brief overview…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Benefits</label>
          <textarea id="fieldBenefits" class="admin-search" rows="4" placeholder="Key benefits…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Ingredients</label>
          <textarea id="fieldIngredients" class="admin-search" rows="4" placeholder="Full ingredients list…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">How to Use</label>
          <textarea id="fieldHowToUse" class="admin-search" rows="3" placeholder="Usage instructions…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Nutrition Facts</label>
          <textarea id="fieldNutrition" class="admin-search" rows="4" placeholder="Per serving info…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <div>
          <label style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-grey);display:block;margin-bottom:6px;">Warnings</label>
          <textarea id="fieldWarnings" class="admin-search" rows="3" placeholder="Safety warnings…" style="width:100%;box-sizing:border-box;resize:vertical;font-family:inherit;"></textarea>
        </div>

        <hr style="border:none;border-top:1.5px solid var(--color-border);margin:4px 0;" />

        <div class="admin-toggle-row">
          <span class="admin-toggle-label">In Stock</span>
          <label class="admin-toggle">
            <input type="checkbox" id="fieldInStock" />
            <div class="admin-toggle__track"></div>
          </label>
        </div>

        <div class="admin-toggle-row" style="border-bottom:none;">
          <span class="admin-toggle-label">Is Featured</span>
          <label class="admin-toggle">
            <input type="checkbox" id="fieldFeatured" />
            <div class="admin-toggle__track"></div>
          </label>
        </div>

      </div>
    </form>
  </div>

  <div style="padding:16px 24px;border-top:1.5px solid var(--color-border);display:flex;gap:12px;flex-shrink:0;background:var(--color-white);">
    <button id="saveProductBtn" style="flex:1;padding:13px;background:var(--color-primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">
      <span id="saveBtnText">Save Product</span>
    </button>
    <button id="cancelPanelBtn" style="padding:13px 20px;background:none;border:1.5px solid var(--color-border);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:var(--color-dark);">
      Cancel
    </button>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toastContainer" style="position:fixed;bottom:32px;right:32px;display:flex;flex-direction:column;gap:10px;z-index:9999;"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://ilduyhuvpiqhvbnocqxf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZHV5aHV2cGlxaHZibm9jcXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTMxNTUsImV4cCI6MjA5NjM4OTE1NX0.uuC8dKajsnSSaiTx_wxNeapKPl4EV20s5phcRS-TaZg';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allProducts = [];
  let editingId   = null;
  let isSaving    = false;

  // ── Auth Guard ──
  async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return null; }

    const { data: adminRow } = await supabase
      .from('admin_users').select('email')
      .eq('email', session.user.email).maybeSingle();

    if (!adminRow) {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
      return null;
    }
    return session;
  }

  // ── Sign Out ──
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'index.html';
  });

  // ── Panel ──
  const panel      = document.getElementById('productPanel');
  const overlay    = document.getElementById('panelOverlay');
  const panelTitle = document.getElementById('panelTitle');
  const saveBtnTxt = document.getElementById('saveBtnText');

  function openPanel(mode = 'add', product = null) {
    editingId = product ? product.id : null;
    if (mode === 'add') {
      panelTitle.textContent = 'Add New Product';
      saveBtnTxt.textContent = 'Save Product';
      document.getElementById('productForm').reset();
      document.getElementById('fieldId').value = '';
    } else {
      panelTitle.textContent = 'Edit Product';
      saveBtnTxt.textContent = 'Update Product';
      populateForm(product);
    }
    clearErrors();
    panel.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('fieldName').focus(), 300);
  }

  function closePanel() {
    panel.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
    editingId = null;
    isSaving  = false;
  }

  document.getElementById('addProductBtn').addEventListener('click', () => openPanel('add'));
  document.getElementById('panelCloseBtn').addEventListener('click', closePanel);
  document.getElementById('cancelPanelBtn').addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  // ── Populate Form ──
  function populateForm(p) {
    document.getElementById('fieldId').value          = p.id                ?? '';
    document.getElementById('fieldName').value        = p.name              ?? '';
    document.getElementById('fieldSeries').value      = p.series            ?? '';
    document.getElementById('fieldFlavour').value     = p.flavour           ?? '';
    document.getElementById('fieldPrice').value       = p.price             ?? '';
    document.getElementById('fieldWeight').value      = p.net_weight        ?? '';
    document.getElementById('fieldImageFolder').value = p.image_folder      ?? '';
    document.getElementById('fieldTags').value        = p.tags              ?? '';
    document.getElementById('fieldShortDesc').value   = p.short_description ?? '';
    document.getElementById('fieldBenefits').value    = p.benefits          ?? '';
    document.getElementById('fieldIngredients').value = p.ingredients       ?? '';
    document.getElementById('fieldHowToUse').value    = p.how_to_use        ?? '';
    document.getElementById('fieldNutrition').value   = p.nutrition_facts   ?? '';
    document.getElementById('fieldWarnings').value    = p.warnings          ?? '';
    document.getElementById('fieldInStock').checked   = !!p.in_stock;
    document.getElementById('fieldFeatured').checked  = !!p.is_featured;
  }

  // ── Validation ──
  function validateForm() {
    clearErrors();
    let valid = true;
    const name  = document.getElementById('fieldName').value.trim();
    const price = document.getElementById('fieldPrice').value;
    if (!name)  { document.getElementById('errName').textContent  = 'Required.'; valid = false; }
    if (!price || isNaN(price) || Number(price) < 0) { document.getElementById('errPrice').textContent = 'Enter a valid price.'; valid = false; }
    return valid;
  }

  function clearErrors() {
    document.getElementById('errName').textContent  = '';
    document.getElementById('errPrice').textContent = '';
  }

  // ── Collect Data ──
  function collectFormData() {
    return {
      name:              document.getElementById('fieldName').value.trim(),
      series:            document.getElementById('fieldSeries').value             || null,
      flavour:           document.getElementById('fieldFlavour').value.trim()     || null,
      price:             parseFloat(document.getElementById('fieldPrice').value),
      net_weight:        document.getElementById('fieldWeight').value.trim()      || null,
      image_folder:      document.getElementById('fieldImageFolder').value.trim() || null,
      tags:              document.getElementById('fieldTags').value.trim()         || null,
      short_description: document.getElementById('fieldShortDesc').value.trim()   || null,
      benefits:          document.getElementById('fieldBenefits').value.trim()    || null,
      ingredients:       document.getElementById('fieldIngredients').value.trim() || null,
      how_to_use:        document.getElementById('fieldHowToUse').value.trim()    || null,
      nutrition_facts:   document.getElementById('fieldNutrition').value.trim()   || null,
      warnings:          document.getElementById('fieldWarnings').value.trim()    || null,
      in_stock:          document.getElementById('fieldInStock').checked,
      is_featured:       document.getElementById('fieldFeatured').checked,
    };
  }

  // ── Save ──
  document.getElementById('saveProductBtn').addEventListener('click', async () => {
    if (isSaving || !validateForm()) return;
    isSaving = true;
    const btn = document.getElementById('saveProductBtn');
    btn.disabled = true; btn.style.opacity = '0.7';

    const payload = collectFormData();
    let error;

    if (editingId) {
      ({ error } = await supabase.from('products').update(payload).eq('id', editingId));
      if (!error) showToast('✅', 'Updated', `"${payload.name}" updated.`);
    } else {
      ({ error } = await supabase.from('products').insert([payload]));
      if (!error) showToast('✅', 'Added', `"${payload.name}" added.`);
    }

    btn.disabled = false; btn.style.opacity = '';
    isSaving = false;

    if (error) { showToast('❌', 'Error', error.message, 'error'); return; }
    closePanel();
    await loadProducts();
  });

  // ── Load Products ──
  async function loadProducts() {
    const { data, error } = await supabase
      .from('products').select('*').order('created_at', { ascending: false });

    const tbody = document.getElementById('productsTableBody');

    if (error) {
      tbody.innerHTML = `<tr><td colspan="8" class="table-loading">Failed to load: ${escHtml(error.message)}</td></tr>`;
      return;
    }

    allProducts = data || [];
    document.getElementById('productCount').textContent =
      `${allProducts.length} product${allProducts.length !== 1 ? 's' : ''}`;

    applyFilters();
  }

  // ── Search & Filter ──
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('filterSeries').addEventListener('change', applyFilters);

  function applyFilters() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const series = document.getElementById('filterSeries').value;
    const filtered = allProducts.filter(p =>
      (!q      || (p.name ?? '').toLowerCase().includes(q)) &&
      (!series || p.series === series)
    );
    renderTable(filtered);
  }

  // ── Render Table ──
  function renderTable(products) {
    const tbody = document.getElementById('productsTableBody');

    if (products.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="table-loading">No products found.</td></tr>`;
      return;
    }

    tbody.innerHTML = products.map((p, idx) => {
      // Prefer Cloudinary URL from `images` JSON; fall back to local image_folder path
      let imgSrc = null;
      if (p.images) {
        try {
          const parsed = typeof p.images === 'string' ? JSON.parse(p.images) : p.images;
          if (Array.isArray(parsed) && parsed.length > 0) {
            imgSrc = parsed[0];
          } else if (typeof parsed === 'string' && parsed.startsWith('http')) {
            imgSrc = parsed;
          }
        } catch (_) {}
      }
      if (!imgSrc && p.image_folder) {
        imgSrc = `../assets/products/${encodeURIComponent(p.image_folder)}/IMAGES/1.jpg`;
      }

      return `
      <tr data-id="${p.id}" id="row-${p.id}">
        <td style="color:var(--color-grey);font-size:12px;">${idx + 1}</td>
        <td>
          ${imgSrc
            ? `<img src="${imgSrc}" alt="" class="product-thumb" onerror="this.style.display='none'" />`
            : `<div class="product-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--color-primary-light);font-size:20px;">📦</div>`}
        </td>
        <td style="font-weight:600;max-width:180px;">
          <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(p.name ?? '—')}</div>
          ${p.flavour ? `<div style="font-size:12px;color:var(--color-grey);font-weight:400;">${escHtml(p.flavour)}</div>` : ''}
        </td>
        <td>${p.series ? `<span class="status-badge status-badge--processing">${escHtml(p.series)}</span>` : '—'}</td>
        <td style="font-weight:600;">₹${Number(p.price ?? 0).toLocaleString('en-IN')}</td>
        <td>
          <label class="table-toggle" title="Toggle stock">
            <input type="checkbox" class="toggle-stock" data-id="${p.id}" ${p.in_stock ? 'checked' : ''} />
            <div class="table-toggle__track"></div>
          </label>
        </td>
        <td>
          <label class="table-toggle" title="Toggle featured">
            <input type="checkbox" class="toggle-featured" data-id="${p.id}" ${p.is_featured ? 'checked' : ''} />
            <div class="table-toggle__track"></div>
          </label>
        </td>
        <td>
          <button class="table-action-btn edit-btn" data-id="${p.id}">✏️ Edit</button>
          <button class="table-action-btn table-action-btn--danger delete-btn" data-id="${p.id}">🗑️</button>
        </td>
      </tr>`;
    }).join('');

    bindTableEvents();
  }

  // ── Table Events ──
  function bindTableEvents() {
    const tbody = document.getElementById('productsTableBody');
    const fresh = tbody.cloneNode(true);
    tbody.parentNode.replaceChild(fresh, tbody);
    const t = document.getElementById('productsTableBody');

    t.addEventListener('change', async e => {
      if (e.target.classList.contains('toggle-stock'))
        await toggleField(e.target.dataset.id, 'in_stock', e.target.checked);
      if (e.target.classList.contains('toggle-featured'))
        await toggleField(e.target.dataset.id, 'is_featured', e.target.checked);
    });

    t.addEventListener('click', e => {
      const eb = e.target.closest('.edit-btn');
      const db = e.target.closest('.delete-btn');
      if (eb) { const p = allProducts.find(p => String(p.id) === String(eb.dataset.id)); if (p) openPanel('edit', p); }
      if (db) { const p = allProducts.find(p => String(p.id) === String(db.dataset.id)); handleDelete(p); }
    });
  }

  // ── Toggle Field ──
  async function toggleField(id, field, value) {
    const { error } = await supabase.from('products').update({ [field]: value }).eq('id', id);
    if (error) { showToast('❌', 'Failed', error.message, 'error'); await loadProducts(); return; }
    const p = allProducts.find(p => String(p.id) === String(id));
    if (p) p[field] = value;
    showToast('✅', 'Updated', `${field === 'in_stock' ? 'Stock' : 'Featured'} ${value ? 'enabled' : 'disabled'}.`);
  }

  // ── Delete ──
  async function handleDelete(product) {
    if (!product) return;
    if (!confirm(`Delete "${product.name}"? This cannot be undone.`)) return;

    const row = document.getElementById(`row-${product.id}`);
    if (row) row.style.opacity = '0.4';

    const { error } = await supabase.from('products').delete().eq('id', product.id);
    if (error) {
      if (row) row.style.opacity = '';
      showToast('❌', 'Delete Failed', error.message, 'error');
      return;
    }

    allProducts = allProducts.filter(p => String(p.id) !== String(product.id));
    showToast('🗑️', 'Deleted', `"${product.name}" removed.`);
    applyFilters();
  }

  // ── Toast ──
  function showToast(icon, title, msg, type = 'success') {
    const t = document.createElement('div');
    t.className = 'admin-toast';
    t.style.cssText = `
      background:${type === 'error' ? '#2d1a1a' : 'var(--color-dark)'};
      color:#fff;padding:14px 18px;border-radius:10px;
      font-size:14px;display:flex;gap:10px;align-items:flex-start;
      box-shadow:0 8px 24px rgba(0,0,0,0.2);min-width:240px;
      ${type === 'error' ? 'border:1px solid #c53030;' : ''}
    `;
    t.innerHTML = `<span>${icon}</span><div><div style="font-weight:700;">${escHtml(title)}</div><div style="font-size:12px;opacity:0.8;">${escHtml(msg)}</div></div>`;
    document.getElementById('toastContainer').appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 4000);
  }

  function escHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str)));
    return d.innerHTML;
  }

  // ── Init ──
  async function init() {
    const session = await checkAuth();
    if (!session) return;
    const email = session.user?.email || '';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();
    await loadProducts();
  }

  init();
</script>

</body>
</html>
