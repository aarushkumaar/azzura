<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Azzurra Pharmaconutrition</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/azzura/assets/css/style.css" />
  <link rel="stylesheet" href="/azzura/assets/css/admin.css" />
  <style>
    body{background:#0d1b2a;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;font-family:sans-serif;}
    .login-page{width:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{background:#14263a;border:1px solid #1e3a5f;border-radius:20px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,0.4);}
    .login-card__brand{text-align:center;margin-bottom:24px;}
    .login-card__logo{font-size:22px;font-weight:800;letter-spacing:0.1em;color:#4da6ff;}
    .login-card__logo-tag{display:block;font-size:10px;color:#aaa;letter-spacing:0.2em;text-transform:uppercase;margin-top:2px;}
    .login-card__title{font-size:11px;color:#4da6ff;text-transform:uppercase;letter-spacing:0.15em;margin-top:6px;}
    .login-card__heading{font-size:28px;color:#fff;text-align:center;margin:0 0 8px;font-weight:600;}
    .login-card__sub{text-align:center;color:#8899aa;font-size:14px;margin-bottom:28px;}
    .login-input-group{display:flex;align-items:center;border:1px solid #1e3a5f;border-radius:10px;padding:12px 16px;margin-bottom:16px;gap:10px;background:#0d1b2a;}
    .login-input{border:none;outline:none;font-size:15px;width:100%;color:#fff;background:transparent;}
    .login-input::placeholder{color:#556;}
    .login-btn{width:100%;padding:14px;background:#1a5fa8;color:#fff;border:none;border-radius:100px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
    .login-btn:hover{background:#154d8a;}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;}
    .login-card__footer{text-align:center;font-size:12px;color:#556;margin-top:24px;}
    .login-error{display:none;padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px;gap:8px;align-items:center;background:#2d1a1a;border:1px solid #c53030;color:#fc8181;}
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-card__brand">
      <div class="login-card__logo">AZZURRA
        <span class="login-card__logo-tag">Pharmaconutrition</span>
      </div>
      <div class="login-card__title">Admin Portal</div>
    </div>
    <h1 class="login-card__heading">Welcome back</h1>
    <p class="login-card__sub">Sign in with your authorised email and password.</p>

    <div class="login-error" id="loginError">
      <span>⚠️</span><span id="loginErrorText"></span>
    </div>

    <form id="loginForm" novalidate>
      <div class="login-input-group">
        <span style="font-size:16px;">✉️</span>
        <input type="email" id="emailInput" class="login-input" placeholder="admin@azzurra.com" autocomplete="email" required />
      </div>
      <div class="login-input-group">
        <span style="font-size:16px;">🔒</span>
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>

    <div class="login-card__footer">Azzurra Admin Panel &copy; 2025</div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://ilduyhuvpiqhvbnocqxf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZHV5aHV2cGlxaHZibm9jcXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTMxNTUsImV4cCI6MjA5NjM4OTE1NX0.uuC8dKajsnSSaiTx_wxNeapKPl4EV20s5phcRS-TaZg';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form          = document.getElementById('loginForm');
  const emailInput    = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn      = document.getElementById('loginBtn');
  const loginBtnText  = document.getElementById('loginBtnText');
  const loginError    = document.getElementById('loginError');
  const loginErrTxt   = document.getElementById('loginErrorText');

  function showError(msg) {
    loginErrTxt.textContent = msg;
    loginError.style.display = 'flex';
  }

  function resetBtn() {
    loginBtn.disabled = false;
    loginBtnText.textContent = 'Sign In';
  }

  // If already logged in, go straight to dashboard
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.replace('dashboard.html');
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.style.display = 'none';

    const email    = emailInput.value.trim().toLowerCase();
    const password = passwordInput.value;

    if (!email || !password) {
      showError('Please enter both email and password.');
      return;
    }

    loginBtn.disabled = true;
    loginBtnText.textContent = 'Signing in…';

    // Step 1: sign in with password
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Invalid email or password.');
      resetBtn();
      return;
    }

    // Step 2: check admin_users allowlist
    const { data: adminRow, error: adminErr } = await supabase
      .from('admin_users')
      .select('email')
      .eq('email', email)
      .maybeSingle();

    if (adminErr || !adminRow) {
      // Valid Supabase user but not an admin — sign them back out
      await supabase.auth.signOut();
      showError('Access denied. This email is not authorised as an admin.');
      resetBtn();
      return;
    }

    // All good — go to dashboard
    window.location.replace('dashboard.html');
  });
</script>
</body>
</html>
