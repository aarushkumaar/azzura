# ============================================================
# AZZURRA — GitHub Pages Deploy Workflow
# Deploys the static site on every push to main.
# No build step needed — the site is pure HTML/CSS/JS.
#
# Also runs a Supabase edge function deploy step.
# Requires these GitHub Actions secrets:
#   SUPABASE_ACCESS_TOKEN   — from https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID     — "ilduyhuvpiqhvbnocqxf" (your project ref)
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # Triggers on every push to main
  workflow_dispatch:  # Allow manual trigger from the Actions tab

# Grant GITHUB_TOKEN permission to write to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Job 1: Deploy static site to GitHub Pages ──────────────
  deploy-pages:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the entire repo root as the Pages artifact.
      # Exclude node_modules, .git, and supabase backend directories.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

