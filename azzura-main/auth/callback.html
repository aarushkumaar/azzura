<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in… — Azzurra Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .callback-card {
      text-align: center;
      padding: 48px 40px;
      max-width: 380px;
      width: 100%;
    }

    .callback-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #60a5fa;
      margin-bottom: 32px;
    }

    .callback-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(96,165,250,0.2);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .callback-title {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
    }

    .callback-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 1.6;
    }

    /* Error state */
    .callback-error {
      display: none;
    }
    .callback-error.show {
      display: block;
    }
    .callback-error-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .callback-error-title {
      font-size: 18px;
      font-weight: 600;
      color: #f87171;
      margin-bottom: 8px;
    }
    .callback-error-msg {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .callback-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #1d4ed8;
      color: #fff;
      border-radius: 100px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .callback-btn:hover { background: #1e40af; }
  </style>
</head>
<body>

<div class="callback-card">
  <div class="callback-logo">AZZURRA</div>

  <!-- Loading state (default) -->
  <div id="loadingState">
    <div class="callback-spinner"></div>
    <div class="callback-title">Signing you in…</div>
    <div class="callback-sub">Verifying your Google account.<br />Please wait a moment.</div>
  </div>

  <!-- Error state (shown on failure) -->
  <div class="callback-error" id="errorState">
    <div class="callback-error-icon">⛔</div>
    <div class="callback-error-title" id="errorTitle">Access Denied</div>
    <div class="callback-error-msg" id="errorMsg">Your account is not authorised to access the admin panel.</div>
    <a href="../index.html" class="callback-btn">← Back to Website</a>
  </div>
</div>

<script type="module">
  // ============================================================
  // AUTH CALLBACK — /auth/callback.html
  //
  // This page handles the redirect from Google OAuth.
  // Supabase sends the user here with a ?code= param (PKCE flow).
  //
  // Flow:
  //  1. exchangeCodeForSession() — trades the code for a session
  //  2. getUser() — gets the authenticated user
  //  3. Query admin_users — check if user.email is in the allowlist
  //  4a. IS admin  → redirect to /admin/dashboard.html ✅
  //  4b. NOT admin → sign out + show "Access Denied" error ❌
  // ============================================================

  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://ilduyhuvpiqhvbnocqxf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsZHV5aHV2cGlxaHZibm9jcXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTMxNTUsImV4cCI6MjA5NjM4OTE1NX0.uuC8dKajsnSSaiTx_wxNeapKPl4EV20s5phcRS-TaZg';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      flowType: 'pkce',
      persistSession: true,
      detectSessionInUrl: true,
    },
  });

  function showError(title, msg) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorTitle').textContent  = title;
    document.getElementById('errorMsg').textContent    = msg;
    document.getElementById('errorState').classList.add('show');
  }

  async function handleCallback() {
    try {
      // ── Step 1: Exchange the OAuth code for a session ──
      // Supabase's detectSessionInUrl:true handles this automatically when
      // getSession() or getUser() is called, but we call it explicitly
      // to handle any errors cleanly.
      const { data: sessionData, error: sessionError } =
        await supabase.auth.getSession();

      if (sessionError) {
        showError('Sign-in Failed', sessionError.message || 'Could not complete sign-in. Please try again.');
        return;
      }

      // If no session yet (e.g. code param still needs exchanging), wait briefly
      if (!sessionData?.session) {
        // Let Supabase process the URL hash/code automatically
        await new Promise(r => setTimeout(r, 800));

        const { data: retrySession, error: retryError } =
          await supabase.auth.getSession();

        if (retryError || !retrySession?.session) {
          showError('Sign-in Failed', 'Could not retrieve session. Please try signing in again.');
          return;
        }
      }

      // ── Step 2: Get the authenticated user ──
      const { data: { user }, error: userError } = await supabase.auth.getUser();

      if (userError || !user) {
        showError('Sign-in Failed', 'Could not retrieve your account. Please try again.');
        return;
      }

      // ── Step 3: Check admin allowlist ──
      const { data: adminRow, error: adminError } = await supabase
        .from('admin_users')
        .select('email, role')
        .eq('email', user.email)
        .maybeSingle();

      if (adminError) {
        // Unexpected DB error
        await supabase.auth.signOut();
        showError('Verification Failed', adminError.message || 'Could not verify admin access. Please try again.');
        return;
      }

      if (!adminRow) {
        // Authenticated but NOT in admin_users
        await supabase.auth.signOut();
        showError(
          'Access Denied',
          `The account "${user.email}" is not authorised to access the admin panel. ` +
          'Please contact a superadmin to request access.'
        );
        return;
      }

      // ── Step 4: Admin confirmed — redirect to dashboard ──
      window.location.replace('../admin/dashboard.html');

    } catch (err) {
      console.error('[callback] Unexpected error:', err);
      showError('Unexpected Error', err.message || 'Something went wrong. Please try again.');
    }
  }

  handleCallback();
</script>

</body>
</html>
